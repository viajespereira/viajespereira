<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ventas - Viajes Pereira</title>
    <style>
        /* CSS: Estilo visual del sistema */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 850px;
        }

        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: #1a73e8; box-shadow: 0 0 5px rgba(26,115,232,0.2); }

        .calc-box {
            background: #f8f9fa;
            border-left: 5px solid #1a73e8;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            border-radius: 4px;
        }

        .calc-item { text-align: center; }
        .calc-item span { display: block; font-size: 12px; color: #777; text-transform: uppercase; }
        .calc-item strong { font-size: 18px; color: #2c3e50; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .table-section { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f3f4; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fcfcfc; }

        .status-msg { text-align: center; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Ventas - Viajes Pereira</h2>
    
    <form id="registroVentas">
        <div class="form-grid">
            <div class="input-group">
                <label>Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="input-group">
                <label>Vendedor</label>
                <input type="text" id="vendedor" placeholder="Nombre" required>
            </div>
            <div class="input-group">
                <label>Costo Paquete ($)</label>
                <input type="number" id="costo" step="0.01" placeholder="0.00" required>
            </div>
            <div class="input-group">
                <label>Inversión Empresa ($)</label>
                <input type="number" id="inversion" step="0.01" placeholder="0.00" required>
            </div>
        </div>

        <div class="calc-box">
            <div class="calc-item">
                <span>Comisión Vendedor (10%)</span>
                <strong id="displayVend">$0.00</strong>
            </div>
            <div class="calc-item">
                <span>Ganancia Neta Empresa</span>
                <strong id="displayEmpresa">$0.00</strong>
            </div>
        </div>

        <button type="submit" id="btnEnviar">Registrar en Hoja de Cálculo</button>
        <p id="mensaje" class="status-msg"></p>
    </form>

    <div class="table-section">
        <h3>Últimos movimientos</h3>
        <table id="tablaVisual">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Vendedor</th>
                    <th>Venta</th>
                    <th>Inversión</th>
                    <th>Comisión (10%)</th>
                    <th>Neto Empresa</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí se agregan las filas dinámicamente -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // JS: Lógica de cálculos y envío
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwPY5_baczy8kjKIzR2ZHFo3sFrNUiQsgFN0yQsaLi0pij1CymMdDJYR-Ku7XY8L9z3/exec';
    const form = document.getElementById('registroVentas');
    const btn = document.getElementById('btnEnviar');
    const msg = document.getElementById('mensaje');

    // Cálculos automáticos mientras escriben
    form.addEventListener('input', () => {
        const costo = parseFloat(document.getElementById('costo').value) || 0;
        const inversion = parseFloat(document.getElementById('inversion').value) || 0;
        
        const comision = costo * 0.10;
        const netoEmpresa = costo - inversion - comision;

        document.getElementById('displayVend').innerText = `$${comision.toFixed(2)}`;
        document.getElementById('displayEmpresa').innerText = `$${netoEmpresa.toFixed(2)}`;
    });

    // Envío de datos
    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando...";
        msg.style.display = "block";
        msg.innerText = "Procesando registro...";
        msg.style.color = "#555";

        const costo = parseFloat(document.getElementById('costo').value);
        const inversion = parseFloat(document.getElementById('inversion').value);
        const comision = (costo * 0.10).toFixed(2);
        const neto = (costo - inversion - comision).toFixed(2);

        const formData = {
            fecha: document.getElementById('fecha').value,
            vendedor: document.getElementById('vendedor').value,
            costo: costo.toFixed(2),
            inversion: inversion.toFixed(2),
            gananciaVendedor: comision,
            gananciaEmpresa: neto
        };

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData) 
        })
        .then(response => {
            msg.innerText = "¡Venta registrada con éxito!";
            msg.style.color = "green";
            actualizarTablaLocal(formData);
            form.reset();
            resetCalculos();
        })
        .catch(error => {
            msg.innerText = "Error al registrar. Intenta de nuevo.";
            msg.style.color = "red";
            console.error('Error!', error.message);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Registrar en Hoja de Cálculo";
            setTimeout(() => { msg.style.display = "none"; }, 5000);
        });
    });

    function actualizarTablaLocal(d) {
        const tbody = document.querySelector('#tablaVisual tbody');
        const fila = `<tr>
            <td>${d.fecha}</td>
            <td>${d.vendedor}</td>
            <td>$${d.costo}</td>
            <td>$${d.inversion}</td>
            <td>$${d.gananciaVendedor}</td>
            <td>$${d.gananciaEmpresa}</td>
        </tr>`;
        tbody.insertAdjacentHTML('afterbegin', fila);
    }

    function resetCalculos() {
        document.getElementById('displayVend').innerText = "$0.00";
        document.getElementById('displayEmpresa').innerText = "$0.00";
    }
</script>

</body>
</html>
