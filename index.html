<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Pereira - Registro Oficial</title>
    <style>
        body { background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { background: #fff; width: 100%; max-width: 450px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #1a73e8; }
        header h1 { color: #2c3e50; margin: 0; font-size: 28px; text-align: center; }
        header p { color: #666; margin: 10px 0 30px; text-align: center; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #e1e4e8; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #bdc3c7; }
        #status { margin-top: 20px; padding: 12px; border-radius: 10px; text-align: center; display: none; font-weight: 600; }
        .success { background-color: #d4edda; color: #155724; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>@viajespereira</h1><p>Sistema Central de Registro</p></header>
        <form id="f">
            <div class="form-group"><label>Cédula / Pasaporte</label><input type="text" name="cedula" required></div>
            <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
            <div class="form-group"><label>Apellido</label><input type="text" name="apellido" required></div>
            <div class="form-group"><label>Edad</label><input type="number" name="edad" required min="0"></div>
            <div class="form-group"><label>Celular</label><input type="tel" name="celular" placeholder="+58..." required></div>
            <button type="submit" id="b">Enviar a Base de Datos</button>
        </form>
        <div id="status"></div>
    </div>
    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbzqsmDLZEntcAyuJvAgp_VLDohDgivMN8SV3P1htM0w0VZ7Cgiyigm6MQQbXJC93g4/exec';
        const f = document.getElementById('f');
        const b = document.getElementById('b');
        const s = document.getElementById('status');
        f.addEventListener('submit', async (e) => {
            e.preventDefault();
            b.disabled = true; b.innerText = 'Sincronizando...';
            const d = { cedula: f.cedula.value, nombre: f.nombre.value, apellido: f.apellido.value, edad: f.edad.value, celular: f.celular.value };
            try {
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
                s.innerText = '¡Registrado con éxito!'; s.className = 'success'; f.reset();
            } catch (err) { alert('Error al guardar'); } 
            finally { b.disabled = false; b.innerText = 'Enviar a Base de Datos'; setTimeout(() => s.style.display = 'none', 5000); }
        });
    </script>
</body>
</html>
