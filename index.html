<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Pereira - Registro Oficial V5</title>
    <style>
        body { background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { background: #fff; width: 100%; max-width: 480px; padding: 30px 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #1a73e8; }
        h1 { color: #2c3e50; margin: 0; text-align: center; font-size: 28px; }
        p { color: #666; text-align: center; margin-bottom: 25px; }
        .section { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 20px 0 10px; border-bottom: 1px solid #eee; text-transform: uppercase; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 11px; border: 2px solid #e1e4e8; border-radius: 10px; font-size: 15px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 14px; background-color: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:disabled { background-color: #bdc3c7; }
        #status { margin-top: 15px; padding: 10px; border-radius: 10px; text-align: center; display: none; font-weight: 600; font-size: 14px; }
        .success { background-color: #d4edda; color: #155224; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>@viajespereira</h1>
        <p>Registro Central de Viajeros</p>
        <form id="f">
            <div class="section">Datos del Ejecutivo</div>
            <div class="form-group"><label>Ejecutivo de Venta</label><input type="text" name="ejecutivo" placeholder="Nombre del vendedor" required></div>
            <div class="section">Datos del Viajero</div>
            <div class="form-group"><label>Cédula / Pasaporte</label><input type="text" name="cedula" required></div>
            <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
            <div class="form-group"><label>Apellido</label><input type="text" name="apellido" required></div>
            <div class="form-group"><label>Edad</label><input type="number" name="edad" required min="0"></div>
            <div class="form-group"><label>Correo Electrónico</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Celular</label><input type="tel" name="celular" placeholder="+58..." required></div>
            <button type="submit" id="b">Finalizar Registro</button>
        </form>
        <div id="status"></div>
    </div>
    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbx4oFr3QsXl9PjPwLwfaEagm_kRoZ2hQcDnyOxkRCShJ2wrakTFKTaF6PiALMMUGXA/exec';
        const f = document.getElementById('f');
        const b = document.getElementById('b');
        const s = document.getElementById('status');
        f.addEventListener('submit', async (e) => {
            e.preventDefault();
            b.disabled = true; b.innerText = 'Sincronizando...';
            const d = { ejecutivo:f.ejecutivo.value, cedula:f.cedula.value, nombre:f.nombre.value, apellido:f.apellido.value, edad:f.edad.value, email:f.email.value, celular:f.celular.value };
            try {
                await fetch(URL, { method: 'POST', mode: 'no-cors', cache: 'no-cache', body: JSON.stringify(d) });
                s.innerText = '¡Registro completado exitosamente!'; s.className = 'success'; f.reset();
            } catch (err) { alert('Error al guardar en la base de datos'); } 
            finally { b.disabled = false; b.innerText = 'Finalizar Registro'; setTimeout(() => { s.style.display = 'none'; }, 5000); }
        });
    </script>
</body>
</html>
